author: WayneHuang1185
date: 2026-03-12
question: |
  在一個大型圖書館系統中，資料庫分為「書籍記錄區」和「日誌區」。
  前者包含**長期存放的冷資料與頻繁更新的熱資料**，而後者則是**純熱資料，極高頻率寫入**。
  若此資料庫使用SSD作為儲存的媒介，且此資料庫兩個區域可視為獨立個體
  請問以下哪種victim selection和wear leveling的策略分別最適合「書籍記錄區」和「日誌區」？ (目標提高endurance和GC效率)
  選項將以(victim selection, wear leveling)的格式呈現，第一個pair對應「書籍記錄區」，第二個pair則對應「日誌區」。
options:
  - text: (cost-benefit,static wear leveling),(greedy, dynamic wear leveling)
    correct: true
    explanation: |
      書籍記錄區包含冷資料和熱資料，更新頻率不一，因此適合使用cost-benefit策略來優化寫入效率和壽命。
      static wear leveling可以確保不會發生冷資料塞滿整個block，導致GC效率降低的情形發生。
      而日誌區是純熱資料，寫入頻率極高，適合使用greedy策略來快速回收空間，同時搭配dynamic wear leveling來均衡磨損。
  - text: (cost-benefit, static wear leveling),(cost-benefit, static wear leveling)
    explanation: |
      因為日誌區的全為熱資料，資料更新頻率很高，所以平均每個block的age都會很小，此時使用greedy策略能最大化GC效率。
      而在日誌區使用static wear leveling則沒有什麼必要，因為基本沒有冷資料佔據年輕block的情況發生。
  - text: (cost-benefit, dynamic wear leveling),(greedy, dynamic wear leveling)
    explanation: |
      書籍記錄區包含冷資料和熱資料，若發生冷資料塞滿年輕lock的情況，dynamic wear leveling則無發處理此種情況發生，導致無法均勻的磨損。
  - text: (cost-benefit, dynamic wear leveling),(cost-benefit, dynamic wear leveling)
    explanation: |
      因為日誌區的全為熱資料，資料更新頻率很高，所以平均每個block的age都會很小，此時使用greedy策略能最大化GC效率。
      書籍記錄區包含冷資料和熱資料，若發生冷資料塞滿年輕lock的情況，dynamic wear leveling則無發處理此種情況發生，導致無法均勻的磨損。
